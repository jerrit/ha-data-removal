<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — DataRemoval</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        rel="stylesheet" />
</head>
<body class="bg-dark d-flex align-items-center justify-content-center" style="min-height:100vh;">

  <div class="card border-0 shadow" style="width:100%;max-width:380px;">
    <div class="card-body p-4">

      <div class="text-center mb-4">
        <i class="bi bi-shield-lock-fill text-info" style="font-size:2.5rem;"></i>
        <h4 class="mt-2 mb-0 fw-bold">DataRemoval</h4>
        <p class="text-muted small mt-1">Enter the password to continue</p>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }} py-2 small">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="post" action="{{ url_for('login') }}">
        <input type="hidden" name="next" value="{{ next }}" />
        <div class="mb-3">
          <label class="form-label fw-medium">Password</label>
          <input type="password" name="password" class="form-control"
                 autofocus autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn btn-info text-white w-100">
          <i class="bi bi-unlock me-1"></i>Unlock
        </button>
      </form>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmO4IzlgIxAVNVXHkiiMNRLMBqBi"
          crossorigin="anonymous"></script>
</body>
</html>
