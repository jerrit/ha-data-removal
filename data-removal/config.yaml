name: Data Removal
version: "1.0.0"
slug: data_removal
description: >-
  Monitor 35 data broker sites for your personal information and automate
  opt-out removal requests. Data stays local — nothing is sent externally.
url: https://github.com/jerrit/ha-data-removal
arch:
  - aarch64
  - amd64

startup: application
boot: auto

ingress: true
ingress_port: 8099

map:
  - data:rw

options:
  first_name: ""
  last_name: ""
  city: ""
  state: ""
  state_full: ""
  email: ""
  phone: ""
  secret_key: ""
  web_password: ""

schema:
  first_name: str
  last_name: str
  city: str?
  state: str?
  state_full: str?
  email: email?
  phone: str?
  secret_key: password?
  web_password: password?
