name: Build & Push

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get addon version from config.yaml
        id: addon
        run: |
          VERSION=$(grep '^version:' data-removal/config.yaml | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: ./data-removal
          platforms: linux/amd64,linux/arm64/v8
          push: true
          tags: |
            ghcr.io/jerrit/ha-data-removal/data-removal:latest
            ghcr.io/jerrit/ha-data-removal/data-removal:${{ steps.addon.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
